author: "Ryan180602"
delete-after: True
changes:
  - balance: "Adds miniscule passive blood regen. Procs when uncon, and not hungry/thirsty"
  - balance: "Strong Red heals a few factors less. And stays longer in system. Does not regen blood."
  - balance: "Regular Red heals the same. Does not regen blood."
  - balance: "Bandages are 0.5x more effective (compared to 0.25x at current)."
  - balance: "Water regens blood more, now. (Nearly as much as prior strong red did)."
  - balance: "Cheeles start with more blood, and can carry as much blood as in a person."
  - bugfix: "Miracle range is now enforced properly. Miracle is 4-tile radius, Fortify(and other greater miracles) are also 4-tile radius."
  - rscadd: "Miracles produce a beam from user to target."
  - code_imp: "Blood transfer Miracle is now Blood Boon."