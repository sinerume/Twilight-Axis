author: "WeNeedMorePhoron"
delete-after: True
changes:
  - rscadd: "Skilled AI should now properly target weak spots."
  - rscadd: "Railing are now climable"
  - rscadd: "AI will now climb railings."
  - rscadd: "Added compatibilities with bottlebomb tossing and tossblade belt usage to AI and tossblade using bogmen and bottlebombs using NPC."
  - rscadd: "Certain NPCs now drop a line on death."
  - rscadd: "Bogmen no longer immune to kneestingers. NPC will now path around spike pits, rune wards and kneestingers if possible."
  - rscadd: "Vulnerable / Exposed inflicts extra damage to simple animals"
  - balance: "Bottlebombs no longer inflict extra damage to mindless complex mob or rideable simple animals"
  - balance: "AI Kick CD raised from 8s to 20s"
  - balance: "AI Feint CD added, now can perform it maximum every 30s"
  - balance: "AI cannot call for help through wall"
  - balance: "AI will aggro and call for help when shot by ranged attack and temporarily ignore its aggro range limit, to reduce amount of long range cheese possible."
  - balance: "AI jitter (Artificial clickdelay) after attack raised from 15 - 30%"
  - balance: "AI is now capable of resolving to a stale tile if you are moving and missing its hit. The chance of hitting is capped at 40% no matter what and missing chance is reduced by int / perception."
  - balance: "AI gain a cooldown penalty in using special, currently 1.5x that of a normal player's CD"
  - balance: "AI now have a 3 seconds cooldown between feint, special and kick to make them less perfect at comboing and less oppressive to deal with."
  - rscdel: "Removed the proximity field I ported from Vanderlin in favor of old spatial grid based wake up and aggressive scanning which is more performant and reliable."
  - rscdel: "Obelisk no longer have a misleading description saying it is magic resistant."
  - rscadd: "Tent Doors are now opaque for AI purpose, and should no longer propagate AI call for help or have AI aggro you through. (They were not set as opaque in code)"
  - bugfix: "Fixed a severe issue with AI Pathfinding causing them to fail 9 out of 10 times or so"