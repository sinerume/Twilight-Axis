author: "WeNeedMorePhoron"
delete-after: True
changes:
  - balance: "Arcyne Ward no longer regenerate on its own, and must be actively dismissed and recast, CD reduced to 1 minutes, uncasting refunds cooldown proportional to remaining integrity and is only accessible by full mages (1 or more Major Aspect), no more super proliferation."
  - balance: "Fire Resistance granted by Dragonhide, Astrata, Enchantments etc. no longer flat out make you immune to fire stacks but merely halve the damage you take and the stacks you take. The trait that makes you immune to firestacks is no longer accessible for normal players."
  - balance: "Fire stacks damage has been adjusted to be around 33% lower on the highest end."
  - balance: "Dragonhide now grants +1 Constitution."
  - balance: "Deny the Mother keeps old NO_FIRE trait as it belongs to a powerful antagonist and is a situational ability."
  - rscadd: "Chalk can now rename and give keywords to teleport runes."
  - rscadd: "Quarterstaff and Woodstaff now counts as an implement for the purpose of not giving you a penalty on cast"
  - rscadd: "You can bring along 2 muggles when using teleport runes, up from 1"
  - balance: "Kastvyl empowered no longer invisible (this is a bug). CD increased to 9s from 8s. Damage is now 40 / 70 -> 35 / 60. When it bounce on the same person it no longer deal halved damage (It just don't do any damage and go through them)"
  - rscadd: "Wither reverted and reworked to a lineal, 4 ticks delay strike that saps your stats again"
  - balance: "Audited all arced projectiles damage, those that were too high (Greater Arcyne Bolt) were fixed, those too low (fireball) were increased. Unified around 25% damage penalty"
  - rscadd: "Bestowed Ward now breaks and disappear on breaking and will be overridden by spell. CD reduced to 1.5 minutes base"
  - balance: "Arcyne Ward cast time increased to 8s from 3s to make mid combat use way harder."