author: "Ollanius"
delete-after: True
changes:
  - code_imp: "Fixes the male test sprite in all clothing-related .dmis. It should no longer be inexplicably a pixel taller in certain directions."
  - rscadd: "Iron coat of plates and lamellar, alongside the classic breastplate and a new Valorian-related line of throwback breastplates / half-plates / full-plates. The latter can either be acquired via a Triumph potion (alongside the classic breastplate) or imported-slash-forged."
  - bugfix: "Jade halfmasks should properly render now. Thanks, Noire!"
  - rscadd: "Copper lamellar coats, alongside redone sprites for almost every copper-related item. Tin, too."
  - rscadd: "Bronze lamellar coats, bronze chainmail, bronze maille sleeves, and bronze maille coifs."
  - rscadd: "A repaletted version of the Heartfeltian armor sets, exclusive to Donators."
  - rscadd: "Complete reshading of 7erracotta's lovely gemstone sprites, alongside a new dedicated gemstone weapon for all previously-untouched types."
  - rscadd: "Completely new and dedicated sprites for all Ascendant- and Vampire-type secondary armor pieces."
  - rscadd: "Completely new sprites for all special ingots and smelting results."
  - rscadd: "Completely new sprite for the Vampire Lord's crown."
  - bugfix: "Properly adds full body support to the Vampire Lord's undermaille and robe, alongside functioning sleeve sprites."
  - rscadd: "New donator-exclusive (for now?) garb, courtesy of Roguetown Beta sprites from Johnie; two noble coats and two noble head decorations. Note that the latter is currently intended to only work by SHIFT+RMBing them into helmet inventories, until someone can figure out how to make onmob offsets work."
  - rscadd: "Full armorkini support, building off Lamasmaster's work. Male and dwarf sprites are now custom-tailored, and they should now properly render on all physiques. Oh, and you can now get them quicker via a special Triumph-purchasable morphing elixir."
  - code_imp: "Removes the dropshrink from ingots and needles. Should probably be able to more easily click this stuff."
  - balance: "Properly adds plate-tier protection to the gem bracelets, parity-matching them with their masks. Likewise, they're exceptionally fragile."
  - balance: "Gemstone weapons are now largely forked off actual weapons, instead of their stone equivalents. Note that their absurdly low integrity, sharpness, and defense values remain in place."
  - bugfix: "Steel maille boots should properly render, now."
  - rscadd: "Doublets! Greyscaled apothecary shirts for donators, in essence."
  - code_imp: "Courtesy of Sigma, we now have a functioning 'worn_offset' variable. This means we can now have larger headpieces without needing to migrate them into a 64x64 .dmi. You can find an example of this in the 'donor_clothes.dm', for the Oathkeeper's noble headpiece decorations."
  - rscadd: "Gambesoned kilts!"
  - code_imp: "You can now apply classic skins to the original gambesons, alongside their kilts, via RMB."