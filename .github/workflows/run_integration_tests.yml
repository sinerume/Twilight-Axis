# This is a reusable workflow to run integration tests on a single map.
# This is run for every single map in ci_suite.yml. You might want to edit that instead.
name: Run Integration Tests

on:
  workflow_call:
    inputs:
      map:
        required: true
        type: string
      major:
        required: false
        type: string
      minor:
        required: false
        type: string
      max_required_byond_client:
        required: true
        type: string

jobs:
  run_integration_tests:
    # If `inputs.major` is specified, this will output `Run Tests (major.minor; map; max)`.
    # For example, `Run Tests (515.1627; runtimestation; 515)`.
    #
    # Otherwise, it will output `Run Tests (map; max)`.
    # For example, `Run Tests (runtimestation; 515)`.
    name: Run Tests (${{ inputs.major && format('{0}.{1}; ', inputs.major, inputs.minor) || '' }}${{ inputs.map }}; ${{ inputs.max_required_byond_client }})
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Restore BYOND from Cache
        uses: ./.github/actions/restore_or_install_byond
        with:
          major: ${{ inputs.major }}
          minor: ${{ inputs.minor }}
      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ inputs.major || env.BYOND_MAJOR }}-${{ inputs.minor || env.BYOND_MINOR}}
          path: ./
      - name: Install rust-g
        run: |
          bash tools/ci/install_rust_g.sh
      - name: Install BYOND dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install libcurl4-openssl-dev:i386
      - name: Run Tests
        id: run_tests
        run: |
          source $HOME/BYOND/byond/bin/byondsetup

          set +e

          /usr/bin/time -v bash tools/ci/run_server.sh ${{ inputs.map }} > server_stdout.txt 2> metrics.txt
          STATUS=$?

          echo "===== server stdout ====="
          cat server_stdout.txt || true

          echo "===== metrics / stderr ====="
          cat metrics.txt || true

          echo "===== ci logs ====="
          find ci_test/data/logs -maxdepth 4 -type f -print -exec sed -n '1,260p' {} \; || true

          MEM_KB=$(grep "Maximum resident set size" metrics.txt | awk '{print $6}')
          if [ -n "$MEM_KB" ]; then
            echo "max_mem=$((MEM_KB / 1024))MB" >> $GITHUB_OUTPUT
          fi

          exit $STATUS
          
