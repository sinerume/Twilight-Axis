author: "Ollanius"
delete-after: True
changes:
  - rscadd: "The Staker, a PVE-centric ranged weapon that can either be acquired by the Exorcist or produced by the Artificer. Deals the lowest damage out of any ranged weapon in the game, in exchange for minor anti-unholy properties, easier handling, and a very easily-sourced type of ammunition."
  - rscadd: "Shotstakes, a new proprietary caliber exclusively used by the Staker. Inherits the heavy penetration of regular crossbow bolts, but has the lowest damage out of any ranged weapon in the game. These can be made by introducing any stake (carved, sharpened, hand- or silver-tipped) to a brazier, hearth, or campfire."
  - balance: "Adds the Silver Halberd, Executioner Sword, Knuckledusters, Hunting Knife, Tomahawk, and Staker to the Exorcist's loadout."
  - balance: "Moved the Steel Broadsword to the Exorcist's sidearm options, alongside the rest of the non-silvered weapons."
  - balance: "Partially restored the damage multiplier of most axes - chiefly, the Silver Poleaxe - with the 'long-' chopping and cutting intents. These should now match the Halberd's 1.3x damage modiifer."
  - rscadd: "The Roundface Bascinet, as donated by Noire."