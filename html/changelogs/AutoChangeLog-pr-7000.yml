author: "WeNeedMorePhoron"
delete-after: True
changes:
  - rscadd: "Jawbanks accessed through meister for everyone. New TGUI interface for Meister, more loans abilities. Jawbanks for Church, Innkeeper, Merchant and Bathhouse to hold their factor"
  - rscadd: "Added more income for bathhouse, an ordinance linking Bathhouse and Church together in exchange for laws and more initial valuables in the bathhouse vault for them to generate initial income"
  - rscadd: "Improved Silverface & Goldface gameplay loop"
  - rscadd: "Massive merchant gameplay loop overhaul"
  - rscadd: "Commissioner machine for commissions"
  - rscadd: "Silverface no longer lockable"
  - rscadd: "HERMES to various notice board spots"
  - rscadd: "Zadcote & Zadcage system"
  - rscadd: "Item quality framework, now looted goods start off scavenged with 20% value"
  - rscadd: "Improved TGUI interface for Mercenary statue, plus adventurer and wretch accesses"
  - rscadd: "HERMes are now cooldown based with a free letter every 5 minutes"
  - rscadd: "Two protoypes of towner quest for smith / miners role, accessible through \"POSTINGS\" in the Contract Ledger"
  - rscadd: "Completely overhauled the noticeboard and added an Avisa section. Also mapped in mini noticeboard sprited by Ollanius for keeping up to date on the eocnomy"
  - rscadd: "Adjusted heads price downward. Kept levy at 30% to prevent mega headconomics inflation"
  - rscadd: "Smelter smelting time has been halved"
  - rscadd: "Merchantry remapped"
  - rscadd: "alot of UI improvements & adjustments here and there and here and there"
  - rscadd: "Commissioner has been made far less laggy and improved"
  - rscadd: "Brassface no longer starts locked"
  - bugfix: "Indebted is no longer broke (agian)"
  - rscadd: "Tailor & Smith Escrow Machine"
  - rscadd: "Fixed mailtags on hermes"
  - rscadd: "Merchant has been remapped 10,000 times"
  - rscadd: "Adventurers & Wretches can use the talkstatue. Only BH members can access the wretch side. This does not include their agents yet"
  - rscadd: "When a stockpile is full but there is still regional demand, it automatically export 1 or more units up to the regional demand and gives the stockpiler the buy price, with the Crown pocketing the differences"
  - rscadd: "Add direct stockpile import, which disallow direct stockpile import beyond regional supply, it follows the price that Crown must pays instead of staying static during a shortage. Added clay shortage events"
  - rscadd: "Added Item Quality to most crafted items. Item quality is respected on ship fulfilliments and on standing orders now Removed the masterwork sparkles. I also adjusted the quality curve to guarantee Standard at Journeyman with escalating chance of higher quality up to Legendary at 100% masterwork which sells for 1.5x. This is a slightly more generous curve I decided on to avoid overly inflating the economy while preserving niche for towners who generally start at higher kills, and give incentives to also take apprentice on them to start with high margin craft early on."
  - rscadd: "Scavenged item quality to all items that is spawned on NPCs to encourage you to salvage or use them but not directly sell them"
  - rscadd: "Reworked quality and sellprices for carved gems to match material cost exactly at a 1.5x markup, as carving is supremely easy and highly profitable. I might adjust gemcarving skills upward and or consider locking it"
  - rscadd: "Bathhouse Agency and other Agency / Benefactorship (Church / Merchant / Bathhouse) is now explained properly in the draft writ. They no longer announce on scom and is visible otherwise. Bathhouse Agency now grant you the ability to squeeze through the bathhouse tunnel and get 100% instead of 50% at the smuggler navigator."
  - rscadd: "Added the ability to toggle Parchment Theme from Parchment to Leatherbound in Game Settings - This is basically a customized yellow / gold on brown scheme that should be easier on your eyes without imitating the old RT red on matte black anti UX design vibe."
  - rscadd: "Added per regional drinks victualling order. Most realms now demand BREWABLE drinks / alcohol, a small amount matching their own culture, and a large amount that their cultures don't produce. Naledian demands fermented crab and tea."