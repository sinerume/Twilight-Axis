author: "radarseas"
delete-after: True
changes:
  - rscadd: "Added a ton of random NPC loadouts."
  - rscadd: "NPCs now use random voicepacks."
  - rscadd: "NPCs now use random voice colors from a 10 choice pick."
  - rscadd: "most NPCs can now alternative between genders randomly."
  - rscadd: "a couple more NPC lines."
  - rscadd: "skeleton NPCs can now utter single-lines in Zizocant (Kill/Fight, they're ferals, sire.), or laugh and rage against the lyving."
  - balance: "changed the weaponry some NPCs spawn with."
  - balance: "Alotheos skeletons can now fient and do specials, the vile doctor can now dodge via dodge expert, they also shuffle around more and should be a proper, worthy miniboss instead of just free loot that's slightly harder to parry."
  - balance: "mad touched now gets bronze Kalopshes instead of steel grade."
  - balance: "more NPCs spawn with armor repair kits."
  - balance: "northman raiders can now use specials but in turn have become slightly more uncommon in quests,"
  - balance: "some NPCs spawn with amulets for flavor."
  - balance: "vault psydonite lizards have armored robes to make them slightly harder, they also use unique lines now."
  - balance: "due to technical restraints, reavers have less armor and bomb use chance, instead they play out by more tossblade use and slightly higher int."
  - balance: "orc warlord has been redone slightly with how they play out, instead they have iron banded plate armor + heavy weapon + int, but lose speed and con, making them smart enough to use specials (unless you daze them), 2 tile damage dishers that aren't headlong in the crowd of orcs, suitable as a proper miniboss worthy of fighting."
  - balance: "slightly less northman raiders in the blockade event."
  - balance: "some NPCs now weight their shield based off of their weapon pick."
  - balance: "kalopsh knight now has a gorget since they lost the swift boon that made them hilariously dangerous."
  - balance: "NPCs with duel wielding now recieve the trait to let them actually use their weapons."
  - balance: "downtuned the mad touched treasure hunter's iron to iron/banded iron plate/bracers/gauntlets"
  - bugfix: "fixed deserters/highwaymen not correctly using different hair."
  - bugfix: "fixed bodies of NPCs being weird when they're trying to use the female bodytype."